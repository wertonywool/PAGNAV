<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar App | PagNav 2.0</title>
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" id="theme-link" href="css/themes/modern_dark.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-main);
            padding: 20px;
            transition: var(--transition-main, all 0.4s ease);
        }
        .studio-card {
            background: var(--bg-card-base);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg, 24px);
            padding: 45px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            backdrop-filter: blur(var(--glass-blur, 10px));
            position: relative;
            z-index: 10;
        }
        .studio-header { text-align: left; margin-bottom: 35px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        .studio-header h2 { font-size: 1.8rem; font-weight: 800; color: var(--text-main); margin: 0; }
        .studio-header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 8px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-span { grid-column: span 2; }
        
        .input-box label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
        .input-box input, .input-box select, .input-box textarea {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            padding: 14px 16px;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        select option {
            background: var(--bg-main);
            color: var(--text-main);
        }

        .input-box input:focus, .input-box select:focus, .input-box textarea:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .btn-group { margin-top: 40px; display: flex; gap: 15px; }
        .btn-save {
            flex: 2;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-cancel {
            flex: 1;
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
        }
        .btn-save:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>
<body>
    <!-- Capas de efectos especiales para temas que lo requieran -->
    <div class="fireflies-layer"></div>
    <div class="surface-glow"></div>

    <div class="studio-card">
        <div class="studio-header">
            <h2 id="form-title">Configurar App</h2>
            <p>Ajusta el diseño y comportamiento de tu aplicación</p>
        </div>
        
        <form id="add-page-form">
            <div class="form-grid">
                <div class="input-box full-span">
                    <label>Nombre Visual</label>
                    <input type="text" id="page-title" required placeholder="Ej: Mi Dashboard">
                </div>
                <div class="input-box">
                    <label>Enlace (URL)</label>
                    <input type="url" id="page-url" placeholder="https://...">
                </div>
                <div class="input-box">
                    <label>Formato de App</label>
                    <select id="page-size">
                        <option value="1-1">Estándar (1x1)</option>
                        <option value="2-1">Horizontal (2x1)</option>
                        <option value="3-1">Panorámico (3x1)</option>
                        <option value="1-2">Vertical (1x2)</option>
                        <option value="1-3">Alargado (1x3)</option>
                        <option value="2-2">Grande (2x2)</option>
                        <option value="3-3">Gigante (3x3)</option>
                    </select>
                </div>
                <div class="input-box">
                    <label>Icono o Emoji</label>
                    <input type="text" id="page-icon" placeholder="🚀 o URL">
                </div>
                <div class="input-box">
                    <label>Color de Tarjeta</label>
                    <input type="color" id="page-color" value="#18181b">
                </div>
                <div class="input-box full-span">
                    <label>Imagen Local (Opcional)</label>
                    <input type="file" id="page-file" accept="image/*">
                </div>
                <div class="input-box full-span">
                    <label>Descripción / Notas</label>
                    <textarea id="page-desc" rows="2" placeholder="¿Para qué sirve esta app?"></textarea>
                </div>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-save">Guardar Cambios</button>
                <a href="index.html" class="btn-cancel">Cancelar</a>
            </div>
        </form>
    </div>

    <script type="module">
        import Store from "./js/store.js";
        import Auth from "./js/auth.js";

        const form = document.getElementById('add-page-form');
        const params = new URLSearchParams(window.location.search);
        const editingId = params.get('edit');

        // Protección y Carga de Tema
        Auth.checkSession(async (user) => {
            if (user) {
                const theme = await Store.getTheme();
                document.getElementById('theme-link').href = `css/themes/${theme.themeName}.css`;
                if (['minimalist_white', 'sakura_zen'].includes(theme.themeName)) {
                    document.querySelector('.btn-save').style.color = '#fff';
                }
            }
        });

        // Cargar datos si es edición
        if (editingId) {
            document.getElementById('form-title').innerText = 'Editar Identidad';
            
            // Función para rellenar el formulario
            const fillForm = (page) => {
                if (!page) return;
                document.getElementById('page-title').value = page.title || '';
                document.getElementById('page-url').value = page.url || '';
                document.getElementById('page-size').value = page.size || '1-1';
                
                // Si el icono es una imagen base64 o URL, dejamos el input de texto vacío para no mostrar código basura
                // pero si es un emoji, lo mostramos.
                const isImg = page.icon && (page.icon.startsWith('data:image') || page.icon.startsWith('http'));
                document.getElementById('page-icon').value = isImg ? '' : (page.icon || '');
                
                document.getElementById('page-color').value = page.color || '#18181b';
                document.getElementById('page-desc').value = page.desc || '';
            };

            // Intentar cargar desde el cache de Store inmediatamente
            Store.subscribePages((pages) => {
                const page = pages.find(p => String(p.id) === String(editingId));
                if (page) fillForm(page);
            });
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btnSave = document.querySelector('.btn-save');
            btnSave.innerText = "Guardando en la Nube...";
            btnSave.disabled = true;
            
            try {
                const fileInput = document.getElementById('page-file');
                let iconValue = document.getElementById('page-icon').value;

                // Lógica de Icono (Compresión WebP ya integrada en toBase64)
                if (fileInput.files && fileInput.files[0]) {
                    iconValue = await toBase64(fileInput.files[0]);
                } else if (!iconValue) {
                    iconValue = '🌐';
                }

                const pageData = {
                    title: document.getElementById('page-title').value,
                    url: document.getElementById('page-url').value,
                    size: document.getElementById('page-size').value,
                    icon: iconValue,
                    color: document.getElementById('page-color').value,
                    desc: document.getElementById('page-desc').value
                };

                if (editingId) {
                    await Store.updatePage(editingId, pageData);
                } else {
                    await Store.savePage(pageData);
                }

                window.location.replace('index.html');
            } catch (err) {
                console.error('Error en la nube:', err);
                alert('Error al sincronizar con Firebase.');
                btnSave.innerText = "Guardar Cambios";
                btnSave.disabled = false;
            }
        };

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 512;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * (img.width > MAX_WIDTH ? scaleSize : 1);
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/webp', 0.8));
                };
                img.src = e.target.result;
            };
            reader.onerror = error => reject(error);
        });
    </script>
</body>
</html>
