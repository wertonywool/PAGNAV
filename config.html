<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar App | PagNav 2.0</title>
    <!-- Icono de Pestaña (Favicon) -->
    <link rel="icon" type="image/png" href="assets/icono%20de%20la%20app-64x64.png">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/config.css">
    <link rel="stylesheet" id="theme-link" href="css/themes/modern_dark.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Capas de efectos especiales para temas que lo requieran -->
    <div class="fireflies-layer"></div>
    <div class="surface-glow"></div>

    <div class="studio-card">
        <div class="studio-header">
            <h2 id="form-title">Configurar App</h2>
            <p>Ajusta el diseño y comportamiento de tu aplicación</p>
        </div>
        
        <form id="add-page-form">
            <div class="form-grid">
                <div class="input-box full-span">
                    <label>Nombre Visual</label>
                    <input type="text" id="page-title" required placeholder="Ej: Mi Dashboard">
                </div>
                <div class="input-box">
                    <label>Enlace (URL)</label>
                    <input type="url" id="page-url" placeholder="https://...">
                </div>
                <div class="input-box">
                    <label>Formato de App</label>
                    <select id="page-size">
                        <option value="1-1">Estándar (1x1)</option>
                        <option value="2-1">Horizontal (2x1)</option>
                        <option value="3-1">Panorámico (3x1)</option>
                        <option value="1-2">Vertical (1x2)</option>
                        <option value="1-3">Alargado (1x3)</option>
                        <option value="2-2">Grande (2x2)</option>
                        <option value="3-3">Gigante (3x3)</option>
                    </select>
                </div>
                <div class="input-box">
                    <label>Icono o Emoji</label>
                    <input type="text" id="page-icon" placeholder="🚀 o URL">
                </div>
                <div class="input-box">
                    <label>Color de Tarjeta</label>
                    <input type="color" id="page-color" value="#18181b">
                </div>
                <div class="input-box full-span">
                    <label>Imagen Local (Opcional)</label>
                    <input type="file" id="page-file" accept="image/*">
                </div>
                <div class="input-box full-span">
                    <label>Descripción / Notas</label>
                    <textarea id="page-desc" rows="2" placeholder="¿Para qué sirve esta app?"></textarea>
                </div>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-save">Guardar Cambios</button>
                <a href="index.html" class="btn-cancel">Cancelar</a>
            </div>
        </form>
    </div>

    <script type="module">
        import Store from "./js/store.js";
        import Auth from "./js/auth.js";

        const form = document.getElementById('add-page-form');
        const params = new URLSearchParams(window.location.search);
        const editingId = params.get('edit');

        // Protección y Carga de Tema
        Auth.checkSession(async (user) => {
            if (user) {
                const theme = await Store.getTheme();
                document.getElementById('theme-link').href = `css/themes/${theme.themeName}.css`;
                if (['minimalist_white', 'sakura_zen'].includes(theme.themeName)) {
                    document.querySelector('.btn-save').style.color = '#fff';
                }

                // CARGAR DATOS SOLO DESPUÉS DE CONFIRMAR SESIÓN
                if (editingId) {
                    document.getElementById('form-title').innerText = 'Editar Identidad';
                    
                    const fillForm = (page) => {
                        if (!page) return;
                        document.getElementById('page-title').value = page.title || '';
                        document.getElementById('page-url').value = page.url || '';
                        document.getElementById('page-size').value = page.size || '1-1';
                        
                        const isImg = page.icon && (page.icon.startsWith('data:image') || page.icon.startsWith('http'));
                        document.getElementById('page-icon').value = isImg ? '' : (page.icon || '');
                        
                        document.getElementById('page-color').value = page.color || '#18181b';
                        document.getElementById('page-desc').value = page.desc || '';
                    };

                    Store.subscribePages((pages) => {
                        const page = pages.find(p => String(p.id) === String(editingId));
                        if (page) fillForm(page);
                    });
                }
            }
        });

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btnSave = document.querySelector('.btn-save');
            const originalText = btnSave.innerText;
            btnSave.innerText = "Guardando...";
            btnSave.disabled = true;
            
            try {
                const fileInput = document.getElementById('page-file');
                let iconValue = document.getElementById('page-icon').value;

                if (fileInput.files && fileInput.files[0]) {
                    iconValue = await toBase64(fileInput.files[0]);
                } else if (!iconValue && !editingId) {
                    iconValue = '🌐';
                }

                const pageData = {
                    title: document.getElementById('page-title').value,
                    url: document.getElementById('page-url').value,
                    size: document.getElementById('page-size').value,
                    color: document.getElementById('page-color').value,
                    desc: document.getElementById('page-desc').value
                };

                // Solo actualizar icono si se cambió o si es nuevo
                if (iconValue) {
                    pageData.icon = iconValue;
                }

                if (editingId) {
                    await Store.updatePage(editingId, pageData);
                } else {
                    await Store.savePage(pageData);
                }

                // Pequeña espera para asegurar que Firebase procese y el cache local se actualice
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 500);

            } catch (err) {
                console.error('Error:', err);
                alert('Error al guardar.');
                btnSave.innerText = originalText;
                btnSave.disabled = false;
            }
        };

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 512;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * (img.width > MAX_WIDTH ? scaleSize : 1);
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/webp', 0.8));
                };
                img.src = e.target.result;
            };
            reader.onerror = error => reject(error);
        });
    </script>
</body>
</html>
