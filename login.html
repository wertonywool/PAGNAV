<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | PagNav 2.0</title>
    
    <!-- Estructura y Temas -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" id="theme-link" href="css/themes/modern_dark.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Efectos de fondo heredados -->
    <div class="fireflies-layer"></div>
    <div class="surface-glow"></div>

    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-rocket"></i>
        </div>
        <h2>PagNav 2.0</h2>
        <p>Tu dashboard personal, sincronizado en la nube.</p>
        
        <button id="login-google" class="google-btn">
            <i class="fab fa-google"></i>
            Continuar con Google
        </button>
    </div>

    <script type="module">
        import Auth from "./js/auth.js";
        import Store from "./js/store.js";

        // Cargar el tema preferido incluso antes de loguear
        async function init() {
            const theme = await Store.getTheme();
            document.getElementById('theme-link').href = `css/themes/${theme.themeName}.css`;
        }
        init();

        // Si ya está logueado, mandarlo al index
        Auth.checkSession((user) => {
            if (user) window.location.href = "index.html";
        });

        document.getElementById('login-google').onclick = () => {
            Auth.login();
        };
    </script>
</body>
</html>
